name: Validate PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, next]

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
